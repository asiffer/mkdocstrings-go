name: release

on: push
permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os:
        - ubuntu-latest
        - macos-latest
        - windows-latest
        python-version:
        - "3.13"
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true
      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml
          cache-suffix: highest

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
          cache-dependency-path: src/lib/go.mod

      - name: Install dependencies
        env:
          UV_RESOLUTION: highest
        run: uv sync --all-extras

      - name: Build Go library
        run: make build-go && uv sync --all-extras
        if: matrix.os != 'windows-latest'

      - name: Build Go library
        run: |
          go build -buildmode=c-shared -o src/mkdocstrings_handlers/go/_internal/libcollector.dll src/lib/*.go
          rm -f src/mkdocstrings_handlers/go/_internal/*.h
          uv sync --all-extras
        if: matrix.os == 'windows-latest'
        shell: bash
      
      - name: Generate wheel
        run: uv run python -m build -w --installer uv 

      - name: Retag the wheel
        run: |
          uv pip install wheel 
          uv run wheel tags --python-tag=py3 --abi-tag=none --remove dist/*.whl
        shell: bash

      - name: Upload wheel
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.os }}-${{ matrix.python-version }}-wheel
          path: dist/*.whl

  publish:
    if: startsWith(github.ref, 'refs/tags/')
    name: Publish to PyPI
    needs:
      - build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/mkdocstrings-golang # Replace <package-name> with your PyPI project name
    permissions:
      id-token: write # IMPORTANT: mandatory for trusted publishing

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v6
        with:
          path: dist/
          merge-multiple: true
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  release:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write # IMPORTANT: mandatory for making GitHub Releases
      id-token: write # IMPORTANT: mandatory for sigstore
    needs:
      - build
    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v6
      with:
        path: dist/
        merge-multiple: true
    - name: Sign the dists with Sigstore
      uses: sigstore/gh-action-sigstore-python@v3.0.0
      with:
        inputs: >-
          ./dist/*.whl
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
        fetch-tags: true
    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.13"
    - name: Setup uv
      uses: astral-sh/setup-uv@v7
    - name: Prepare release notes
      run: uv tool run git-changelog --release-notes > release-notes.md
    - name: Create release
      uses: softprops/action-gh-release@v2
      with:
        body_path: release-notes.md
        files: dist/*

