name: release

on: push
permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os:
        - ubuntu-latest
        - macos-latest
        - windows-latest
        python-version:
        - "3.10"
        - "3.11"
        - "3.12"
        - "3.13"
        - "3.14"
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true
      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml
          cache-suffix: highest

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          cache-dependency-path: src/lib/go.mod

      - name: Install dependencies
        env:
          UV_RESOLUTION: highest
        run: uv sync --all-extras

      - name: Build Go library
        run: make build-go && uv sync --all-extras
        if: matrix.os != 'windows-latest'

      - name: Build Go library
        run: |
          go build -buildmode=c-shared -o src/mkdocstrings_handlers/go/_internal/libcollector.dll src/lib/*.go
          Remove-Item -Force src/mkdocstrings_handlers/go/_internal/*.h
          uv sync --all-extras
        if: matrix.os == 'windows-latest'
      
      - name: Generate wheel
        run: uv run python -m build -w --installer uv # need to run manually
      
      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-${{ matrix.python-version }}-wheel
          path: dist/*.whl

  release:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        fetch-tags: true
    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.13"
    - name: Setup uv
      uses: astral-sh/setup-uv@v5
    - name: Prepare release notes
      run: uv tool run git-changelog --release-notes > release-notes.md
    - name: Create release
      uses: softprops/action-gh-release@v2
      with:
        body_path: release-notes.md

